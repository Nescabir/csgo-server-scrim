# Coolify: set env vars in the UI; use Build Variables for METAMOD_VERSION / SOURCEMOD_VERSION if needed
version: "3"
services:
  csgo-scrim:
    build:
      context: .
      args:
        - METAMOD_VERSION=${METAMOD_VERSION:-1.12}
        - SOURCEMOD_VERSION=${SOURCEMOD_VERSION:-1.12}
    volumes:
      - ${CSGO_DATA_PATH:-./csgo-data}:/home/steam/csgo-dedicated/
    ports:
      # Game (transmission, pings, RCON) – -port
      - "${SRCDS_PORT:-27015}:${SRCDS_PORT:-27015}/tcp"
      - "${SRCDS_PORT:-27015}:${SRCDS_PORT:-27015}/udp"
      # SourceTV – +tv_port
      - "${SRCDS_TV_PORT:-27020}:${SRCDS_TV_PORT:-27020}/udp"
      # Client port – -clientport
      - "${SRCDS_CLIENT_PORT:-27005}:${SRCDS_CLIENT_PORT:-27005}/udp"
      # Steam (outgoing) – -sport
      - "${SRCDS_STEAM_PORT:-26900}:${SRCDS_STEAM_PORT:-26900}/udp"
    environment:
      - SRCDS_TOKEN=${SRCDS_TOKEN}
      - SRCDS_PORT=${SRCDS_PORT:-27015}
      - SRCDS_TV_PORT=${SRCDS_TV_PORT:-27020}
      - SRCDS_CLIENT_PORT=${SRCDS_CLIENT_PORT:-27005}
      - SRCDS_STEAM_PORT=${SRCDS_STEAM_PORT:-26900}
      - SRCDS_RCONPW=${SRCDS_RCONPW:-changeme}
      - SRCDS_PW=${SRCDS_PW:-changeme}
      - SRCDS_NET_PUBLIC_ADDRESS=${SRCDS_NET_PUBLIC_ADDRESS:-0}
      - SRCDS_LAN=${SRCDS_LAN:-0}
      - SRCDS_HOSTNAME=${SRCDS_HOSTNAME:-CS:GO Server}
      - SRCDS_STARTMAP=${SRCDS_STARTMAP:-de_mirage}
      - SRCDS_FPSMAX=${SRCDS_FPSMAX:-300}
      - SRCDS_TICKRATE=${SRCDS_TICKRATE:-128}
      - SRCDS_MAXPLAYERS=${SRCDS_MAXPLAYERS:-14}
      - SRCDS_REGION=${SRCDS_REGION:-3}
      - SCRIM=${SCRIM:-true}
